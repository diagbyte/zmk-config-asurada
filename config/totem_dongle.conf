# Totem dongle (central) — extra config.
# Split role, peripheral count, pointing and battery fetching live in the
# shield's Kconfig.defconfig; this file is for user-facing tweaks.

# USB-powered dongle: never deep sleep.
CONFIG_ZMK_SLEEP=n

# The central grants the BLE connection interval for every peripheral, so the
# improved connection settings must be enabled here too (not just on the
# trackball) for the low-latency link that keeps the trackball responsive.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Asurada status screen layout (this is already the module default; explicit
# here for clarity).
CONFIG_ASURADA_STATUS_SCREEN_ASURADA=y

# Trackball page SCROLL/SNIPE detection: the keymap layers were renumbered when
# the Colemak-DH layer moved to index 1 (SCRLM/SCRLH/SNIPE 6/7/8 -> 7/8/9), so
# override the module defaults (6/7/8) to match config/totem.keymap.
CONFIG_ASURADA_SCROLL_LAYER=7
CONFIG_ASURADA_SCROLL_LAYER2=8
CONFIG_ASURADA_SNIPE_LAYER=9

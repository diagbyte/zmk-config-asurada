# Totem dongle (central) — extra config.
# Split role, peripheral count, pointing and battery fetching live in the
# shield's Kconfig.defconfig; this file is for user-facing tweaks.

# USB-powered dongle: never deep sleep.
CONFIG_ZMK_SLEEP=n

# Asurada status screen layout (this is already the module default; explicit
# here for clarity).
CONFIG_ASURADA_STATUS_SCREEN_ASURADA=y

# Adept trackball peripheral — PMW3610 (badjeff -alt driver) tuning.
# Roles (ZMK_SPLIT / ZMK_POINTING) are set in Kconfig.defconfig.

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PINCTRL=y

# Split peripheral: no USB HID output (ZMK_USB requires a non-split or central
# role; leaving the board default y aborts the Kconfig on current ZMK).
CONFIG_ZMK_USB=n

# PMW3610 optical sensor (badjeff fork -> *_ALT symbols)
CONFIG_PMW3610_ALT=y
# CONFIG_PMW3610_ALT_INVERT_X=y

CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300
# Battery: reach the low-power rest modes sooner (now effective with force-awake
# removed from the overlay). Wake latency = rest sample time (<=300 ms).
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=300
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=8000

# Report faster: 8 ms -> ~125 Hz motion reports, matching the 7.5 ms BLE link
# (was 12 ms / ~83 Hz, which felt choppy through the dongle).
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# BLE tuning carried over from the standalone AdeptBLE build.
# EXPERIMENTAL_CONN + ENFORCE_SUBSCRIPTION were in the original AdeptBLE.conf but
# got dropped in the dongle port, which noticeably lowered pointer responsiveness
# vs. the standalone build. Restored here; MIN_INT=6 explicitly requests a 7.5 ms
# connection interval (ZMK default, stated for clarity) so the trackball->dongle
# link updates as fast as the central will grant.
# TX power: default 0 dBm (was +8 dBm). Trackball<->dongle is desk-distance, so
# 0 dBm reaches fine while the trackball's radio draws less. Use _PLUS_4 if far.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# Interval pinned at 7.5 ms so ACTIVE motion stays smooth, but LATENCY=30 lets the
# idle trackball skip up to 30 connection events (~225 ms) to save battery; on
# motion it still sends at the next 7.5 ms event, so pointing stays responsive.
# (LATENCY=0 = the very smoothest, but more idle drain.)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30

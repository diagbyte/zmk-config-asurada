# 4-device dongle setup:
#   totem_dongle  = central (XIAO BLE) + Asurada GC9A01 display
#   totem_left/right = keyboard halves (peripherals)
#   adept_trackball  = Adept trackball (pointing peripheral)
---
include:
  - board: xiao_ble//zmk
    shield: totem_dongle asurada_adapter
    artifact-name: totem_dongle
  # Keyboard-only variant: verifies the generic CONFIG_ASURADA_TRACKBALL=n path
  # (no trackball page/input) actually compiles. Not for flashing the trackball build.
  - board: xiao_ble//zmk
    shield: totem_dongle asurada_adapter
    cmake-args: -DCONFIG_ASURADA_TRACKBALL=n
    artifact-name: totem_dongle_notrackball
  - board: xiao_ble//zmk
    shield: totem_left
    artifact-name: totem_left
  - board: xiao_ble//zmk
    shield: totem_right
    artifact-name: totem_right
  - board: xiao_ble//zmk
    shield: adept_trackball
    artifact-name: adept_trackball
  # Flash this to any XIAO to wipe old BLE bonds/settings, then flash the real
  # firmware. Needed once when moving to the dongle topology.
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings_reset
